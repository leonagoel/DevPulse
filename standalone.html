    insights.push({type:'neutral',text:`Cycle time of ${m.avgCycleTime.toFixed(1)}d is close to team average — steady execution cadence.`});
  }
  if(m.avgLeadTime>4.5){
    insights.push({type:'warning',text:`Lead time of ${m.avgLeadTime.toFixed(1)}d suggests PRs are queuing in review or CI/CD before reaching production.`});
    actions.push({icon:'⚡',text:'Ping reviewers proactively after 8h of no review. Keep PRs focused (<300 lines) to speed up review cycles.'});
  } else {
    insights.push({type:'positive',text:`Lead time of ${m.avgLeadTime.toFixed(1)}d — healthy PR-to-production pipeline.`});
  }
  if(m.bugRate>0.3){
    insights.push({type:'warning',text:`Bug rate of ${(m.bugRate*100).toFixed(0)}% means ~1 in 2 shipped issues had a production defect this month.`});
    actions.push({icon:'🧪',text:'Add edge-case tests before merging. A quick pre-merge checklist catches config issues, null inputs, and race conditions early.'});
    actions.push({icon:'🤝',text:'Consider pairing with a senior reviewer on your next PR to surface blind spots early.'});
  } else if(m.bugRate===0){
    insights.push({type:'positive',text:'Zero escaped bugs this month — excellent quality discipline.'});
  }
  insights.push({type:'neutral',text:`${m.prodDeployments} production deployment${m.prodDeployments>1?'s':''} — consistent shipping cadence.`});
  if(actions.length===0){
    actions.push({icon:'🎯',text:'Maintain PR size and test coverage to stay in healthy flow.'});
    actions.push({icon:'📈',text:'Consider taking on a stretch goal or mentoring a teammate this month.'});
  }
  return {insights,actions};
}

function PatternBadge({pattern}){
  const p=PATTERNS[pattern];
  return (
    <span style={{
      padding:'4px 10px', borderRadius:9999, fontSize:11, fontWeight:600,
      background:p.bg, border:`1px solid ${p.border}`, color:p.text,
    }}>{p.label}</span>
  );
}

function MetricCard({label, value, unit, prev, benchmark, iconSvg, accentColor, description}){
  const delta = prev !== undefined ? (typeof value==='number' ? value-prev : null) : null;
  const isGoodDown = ['Cycle Time','Lead Time','Bug Rate'].includes(label);
  const deltaGood = delta!==null ? (isGoodDown ? delta<0 : delta>0) : null;
  const vs = benchmark!==undefined && typeof value==='number' ? value-benchmark : null;
  const vsGood = vs!==null ? (isGoodDown ? vs<0 : vs>0) : null;
  return (
    <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:20,transition:'all 0.2s'}}>
      <div className="flex items-center justify-between mb-2">
        <div className="flex items-center gap-2">
          <div style={{width:30,height:30,borderRadius:8,background:`${accentColor}22`,display:'flex',alignItems:'center',justifyContent:'center',color:accentColor,fontSize:14}}>
            {iconSvg}
          </div>
          <span style={{fontSize:10,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.06em',fontWeight:500}}>{label}</span>
        </div>
        {delta!==null && (
          <span style={{
            fontSize:10,padding:'3px 8px',borderRadius:999,
            background: delta===0?'rgba(255,255,255,0.05)': deltaGood?'rgba(34,197,94,0.1)':'rgba(239,68,68,0.1)',
            color: delta===0?'rgba(255,255,255,0.4)': deltaGood?'#4ade80':'#f87171',
          }}>
            {delta===0?'same':((delta>0?'+':'')+Math.abs(delta).toFixed(1))}
          </span>
        )}
      </div>
      <div className="flex items-baseline gap-2 mb-1">
        <span style={{fontSize:28,fontFamily:'Syne,sans-serif',fontWeight:700,letterSpacing:'-0.02em'}}>{value}</span>
        <span style={{fontSize:12,color:'rgba(255,255,255,0.4)'}}>{unit}</span>
      </div>
      <p style={{fontSize:11,color:'rgba(255,255,255,0.35)',lineHeight:1.5}}>{description}</p>
      {vs!==null && (
        <div style={{marginTop:8,fontSize:11,color: vsGood?'rgba(74,222,128,0.7)': vs===0?'rgba(255,255,255,0.3)':'rgba(251,191,36,0.7)',display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:5,height:5,borderRadius:'50%',background:'currentColor'}}/>
          {vs===0?'At team avg':`${vsGood?'':'+'}${vs.toFixed(1)} vs team avg`}
        </div>
      )}
    </div>
  );
}

function InsightTag({type,text}){
  const styles={
    positive:{bg:'rgba(34,197,94,0.1)',border:'rgba(34,197,94,0.2)',color:'rgba(134,239,172,0.9)',icon:'✓'},
    warning: {bg:'rgba(245,158,11,0.1)',border:'rgba(245,158,11,0.2)',color:'rgba(253,211,77,0.9)',icon:'⚠'},
    neutral: {bg:'rgba(255,255,255,0.04)',border:'rgba(255,255,255,0.08)',color:'rgba(255,255,255,0.6)',icon:'→'},
  };
  const s=styles[type];
  return (
    <div style={{display:'flex',gap:12,padding:'12px 14px',borderRadius:12,border:`1px solid ${s.border}`,background:s.bg,color:s.color,fontSize:13,lineHeight:1.6}}>
      <span style={{fontFamily:'monospace',fontSize:11,marginTop:2,flexShrink:0}}>{s.icon}</span>
      <span>{text}</span>
    </div>
  );
}

      <div style={{width:40,height:40,borderRadius:12,background:color,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>{icon}</div>
      <div>
        <div style={{fontFamily:'Syne,sans-serif',fontSize:22,fontWeight:700,letterSpacing:'-0.02em'}}>{value}</div>
        <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:2}}>{label}</div>
        {sub && <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',marginTop:1}}>{sub}</div>}
      </div>
    </div>
  );

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between flex-wrap gap-4">
        <div>
          <h1 style={{fontFamily:'Syne,sans-serif',fontSize:24,fontWeight:700,letterSpacing:'-0.02em'}}>Manager Overview</h1>
          <p style={{color:'rgba(255,255,255,0.4)',fontSize:13,marginTop:2}}>Team health · {MONTH_LABELS[selectedMonth]}</p>
        </div>
        <div style={{display:'flex',gap:4,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.10)',borderRadius:12,padding:4}}>
          {MONTHS.map(mo=>(
            <button key={mo} onClick={()=>setSelectedMonth(mo)} style={{
              padding:'6px 14px',borderRadius:8,fontSize:13,border:'none',cursor:'pointer',
              background:mo===selectedMonth?'rgba(255,255,255,0.10)':'transparent',
              color:mo===selectedMonth?'#fff':'rgba(255,255,255,0.4)',
            }}>{MONTH_LABELS[mo].slice(0,3)}</button>
          ))}
        </div>
      </div>

      {/* Summary */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:14}}>
        {card('✅','Healthy flow',healthy,`of ${monthData.length} devs`,'rgba(34,197,94,0.15)')}
        {card('⚠️','Need attention',attention,'quality watch + review','rgba(245,158,11,0.15)')}
        {card('⏱','Avg cycle time',`${avgCycle}d`,`benchmark ${benchmarks.avgCycleTime}d`,'rgba(139,92,246,0.15)')}
        {card('🐛','Avg bug rate',`${avgBug}%`,'escaped to production','rgba(239,68,68,0.15)')}
      </div>

      {/* Charts */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:20}}>
        <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:24}}>
          <p style={{fontFamily:'Syne,sans-serif',fontWeight:600,fontSize:11,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:16}}>Cycle & Lead Time by Developer</p>
          <ResponsiveContainer width="100%" height={210}>
            <BarChart data={barData} margin={{top:0,right:10,left:-20,bottom:0}}>
              <CartesianGrid stroke="rgba(255,255,255,0.04)" vertical={false}/>
              <XAxis dataKey="name" tick={{fill:'rgba(255,255,255,0.4)',fontSize:11}}/>
              <YAxis tick={{fill:'rgba(255,255,255,0.4)',fontSize:11}}/>
              <Tooltip contentStyle={{background:'#13141a',border:'1px solid rgba(255,255,255,0.1)',borderRadius:8}}
                labelStyle={{color:'rgba(255,255,255,0.6)'}} itemStyle={{color:'rgba(255,255,255,0.8)'}}/>
              <Bar dataKey="cycleTime" name="Cycle Time (d)" fill="#8b5cf6" radius={[4,4,0,0]} opacity={0.85}/>
              <Bar dataKey="leadTime" name="Lead Time (d)" fill="#06b6d4" radius={[4,4,0,0]} opacity={0.85}/>
            </BarChart>
          </ResponsiveContainer>
        </div>

        <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:24}}>
          <p style={{fontFamily:'Syne,sans-serif',fontWeight:600,fontSize:11,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:4}}>Cycle vs Lead Time</p>
          <p style={{fontSize:11,color:'rgba(255,255,255,0.3)',marginBottom:14}}>Bottom-left = best performers</p>
          <ResponsiveContainer width="100%" height={200}>
            <ScatterChart margin={{top:5,right:10,left:-20,bottom:5}}>
              <CartesianGrid stroke="rgba(255,255,255,0.04)"/>
              <XAxis dataKey="x" type="number" domain={[3,7]} name="Cycle Time" tick={{fill:'rgba(255,255,255,0.4)',fontSize:11}}/>
              <YAxis dataKey="y" type="number" domain={[2,6]} name="Lead Time" tick={{fill:'rgba(255,255,255,0.4)',fontSize:11}}/>
              <Tooltip content={<CustomTooltip/>}/>
              <Scatter data={scatterData}>
                {scatterData.map((e,i)=><Cell key={i} fill={TEAM_COLORS[e.team]||'#8b5cf6'} opacity={0.85}/>)}
              </Scatter>
            </ScatterChart>
          </ResponsiveContainer>
          <div style={{display:'flex',justifyContent:'center',gap:16,marginTop:6,flexWrap:'wrap'}}>
            {Object.entries(TEAM_COLORS).map(([t,c])=>(
              <div key={t} style={{display:'flex',alignItems:'center',gap:6,fontSize:11,color:'rgba(255,255,255,0.4)'}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:c}}/>{t}
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Team rollup */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(200px,1fr))',gap:14}}>
        {teamRollup.map(t=>(
          <div key={t.team} style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:20}}>
            <div style={{display:'flex',justifyContent:'space-between',marginBottom:14,alignItems:'center'}}>
              <span style={{padding:'3px 10px',borderRadius:6,fontSize:11,fontWeight:600,background:`${TEAM_COLORS[t.team]}20`,color:TEAM_COLORS[t.team]}}>{t.team}</span>
              <span style={{fontSize:11,color:'rgba(255,255,255,0.3)'}}>{t.members} members</span>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',textAlign:'center',gap:8}}>
              {[['Avg Cycle',`${t.avgCycle}d`,null],['Avg Lead',`${t.avgLead}d`,null],['Bugs',t.bugs,t.bugs>0?'#fbbf24':'#4ade80']].map(([l,v,c])=>(
                <div key={l}>
                  <div style={{fontSize:18,fontFamily:'Syne,sans-serif',fontWeight:700,color:c||'#fff'}}>{v}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,0.3)',marginTop:2}}>{l}</div>
                </div>
              ))}
            </div>
          </div>
        ))}
      </div>

      {/* Dev table */}
      <div style={{background:'rgba(255,255,255,0.03)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:16,padding:24}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:12}}>
          <p style={{fontFamily:'Syne,sans-serif',fontWeight:600,fontSize:11,color:'rgba(255,255,255,0.5)',textTransform:'uppercase',letterSpacing:'0.06em'}}>Developer Breakdown</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
            <div style={{display:'flex',gap:3,background:'rgba(255,255,255,0.04)',padding:3,borderRadius:8}}>
              {teams.map(t=>(
                <button key={t} onClick={()=>setFilterTeam(t)} style={{
                  padding:'4px 10px',borderRadius:6,fontSize:11,border:'none',cursor:'pointer',
                  background:filterTeam===t?'rgba(255,255,255,0.10)':'transparent',
                  color:filterTeam===t?'#fff':'rgba(255,255,255,0.4)',
                }}>{t==='All'?'All':t.split(' ')[0]}</button>
              ))}
            </div>
            <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{
              background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.10)',
              borderRadius:8,padding:'5px 10px',fontSize:11,color:'rgba(255,255,255,0.7)',cursor:'pointer',outline:'none',
            }}>
              <option value="cycleTime">Cycle Time ↑</option>
              <option value="leadTime">Lead Time ↑</option>
              <option value="bugRate">Bug Rate ↑</option>
              <option value="deployFreq">Deploys ↓</option>
            </select>
          </div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {sorted.map((m,i)=>(
            <div key={m.devId} style={{
              display:'flex',alignItems:'center',gap:12,padding:'12px 14px',
              background:'rgba(255,255,255,0.02)',border:'1px solid rgba(255,255,255,0.06)',
              borderRadius:12,flexWrap:'wrap',gap:10,
            }}>
              <span style={{color:'rgba(255,255,255,0.2)',fontFamily:'monospace',fontSize:11,width:16,flexShrink:0}}>{i+1}</span>
              <Avatar dev={m.dev} size={32}/>
              <div style={{flex:1,minWidth:120}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:6}}>
                  <span style={{fontSize:13,fontWeight:500}}>{m.dev.name}</span>
                  <span style={{fontSize:11,color:'rgba(255,255,255,0.3)'}}>{m.dev.level}</span>
                  <span style={{padding:'2px 8px',borderRadius:5,fontSize:10,fontWeight:600,
                    background:`${TEAM_COLORS[m.dev.team]}20`,color:TEAM_COLORS[m.dev.team]}}>{m.dev.team}</span>
                </div>
                <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
                  {[
                    ['Cycle',`${m.avgCycleTime.toFixed(1)}d`,m.avgCycleTime<4.5],
                    ['Lead',`${m.avgLeadTime.toFixed(1)}d`,m.avgLeadTime<4],
                    ['Bug%',`${(m.bugRate*100).toFixed(0)}%`,m.bugRate===0],
                    ['PRs',m.mergedPRs,null],
                    ['Deploys',m.prodDeployments,null],
                  ].map(([l,v,g])=>(
                    <span key={l} style={{
                      padding:'3px 8px',borderRadius:6,fontSize:11,
                      background:g===null?'rgba(255,255,255,0.05)':g?'rgba(34,197,94,0.10)':'rgba(239,68,68,0.10)',
                      border:`1px solid ${g===null?'rgba(255,255,255,0.08)':g?'rgba(34,197,94,0.20)':'rgba(239,68,68,0.20)'}`,
                      color:g===null?'rgba(255,255,255,0.5)':g?'rgba(134,239,172,0.9)':'rgba(248,113,113,0.9)',
                    }}>
                      <span style={{color:'rgba(255,255,255,0.3)',marginRight:4}}>{l}</span>{v}
                    </span>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <PatternBadge pattern={m.pattern}/>
                <button onClick={()=>{setSelectedDev(m.devId);setView('ic');}} title="Open IC view" style={{
                  padding:'5px 8px',borderRadius:7,background:'rgba(255,255,255,0.05)',border:'1px solid rgba(255,255,255,0.08)',
                  cursor:'pointer',color:'rgba(255,255,255,0.4)',fontSize:11,
                }}>→ IC</button>
              </div>
            </div>
          ))}
        </div>
        <div style={{marginTop:14,padding:12,background:'rgba(245,158,11,0.05)',border:'1px solid rgba(245,158,11,0.15)',borderRadius:12}}>
          <p style={{fontSize:11,color:'rgba(253,211,77,0.6)',lineHeight:1.6}}>
            <strong style={{color:'rgba(253,211,77,0.8)'}}>Manager note:</strong> Rankings are for trend-spotting only — not performance judgement. Context always matters: team complexity, on-call load, and scope differ across individuals.
          </p>
        </div>
      </div>
    </div>
  );
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────

function App(){
  const [view,setView]=useState('ic');
  const [selectedDev,setSelectedDev]=useState('DEV-001');
  const [selectedMonth,setSelectedMonth]=useState('2026-04');
  const [mounted,setMounted]=useState(false);
  useEffect(()=>{setTimeout(()=>setMounted(true),50);},[]);

  return (
    <div style={{minHeight:'100vh',background:'#0a0b0f',color:'#fff',fontFamily:'DM Sans,sans-serif',opacity:mounted?1:0,transition:'opacity 0.5s ease'}}>
      {/* Ambient glows */}
      <div style={{position:'fixed',inset:0,pointerEvents:'none',overflow:'hidden',zIndex:0}}>
        <div style={{position:'absolute',top:0,left:'25%',width:400,height:400,background:'rgba(139,92,246,0.07)',borderRadius:'50%',filter:'blur(80px)'}}/>
        <div style={{position:'absolute',bottom:'25%',right:'25%',width:300,height:300,background:'rgba(6,182,212,0.05)',borderRadius:'50%',filter:'blur(80px)'}}/>
      </div>

      {/* Header */}
      <header style={{position:'sticky',top:0,zIndex:50,borderBottom:'1px solid rgba(255,255,255,0.05)',background:'rgba(10,11,15,0.85)',backdropFilter:'blur(24px)',WebkitBackdropFilter:'blur(24px)'}}>
        <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',height:64,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'center',gap:12}}>
            <div style={{width:32,height:32,borderRadius:10,background:'linear-gradient(135deg,#8b5cf6,#06b6d4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>⚡</div>
            <span style={{fontFamily:'Syne,sans-serif',fontWeight:800,fontSize:18,letterSpacing:'-0.01em'}}>DevPulse</span>
            <span style={{fontFamily:'monospace',color:'rgba(255,255,255,0.25)',fontSize:11,marginLeft:2}}>v1.0</span>
          </div>

          <div style={{display:'flex',gap:4,background:'rgba(255,255,255,0.05)',borderRadius:14,padding:4}}>
            {[['ic','👤 IC View'],['manager','👥 Manager']].map(([v,l])=>(
              <button key={v} onClick={()=>setView(v)} style={{
                display:'flex',alignItems:'center',gap:8,padding:'8px 18px',borderRadius:10,fontSize:13,fontWeight:500,
                background:view===v?'rgba(255,255,255,0.10)':'transparent',
                color:view===v?'#fff':'rgba(255,255,255,0.4)',border:'none',cursor:'pointer',transition:'all 0.15s',
              }}>{l}</button>
            ))}
          </div>

          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:'#4ade80',animation:'pulse 2s infinite'}}/>
            <span style={{fontFamily:'monospace',color:'rgba(255,255,255,0.3)',fontSize:11}}>LIVE DATA</span>
          </div>
        </div>
      </header>

      {/* Content */}
      <main style={{maxWidth:1280,margin:'0 auto',padding:'32px 24px',position:'relative',zIndex:1}}>
        {view==='ic'
          ? <ICView selectedDev={selectedDev} setSelectedDev={setSelectedDev} selectedMonth={selectedMonth} setSelectedMonth={setSelectedMonth}/>
          : <ManagerView selectedMonth={selectedMonth} setSelectedMonth={setSelectedMonth} setView={setView} setSelectedDev={setSelectedDev}/>
        }
      </main>

      <style>{`
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        button:hover { opacity: 0.85; }
        * { box-sizing: border-box; }
      `}</style>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
